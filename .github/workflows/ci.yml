# GitHub Actions CI — StealthWord
# テストが自動実行され、失敗時はデプロイを阻止
name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        name: E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            # 1. リポジトリをチェックアウト
            - uses: actions/checkout@v4

            # 2. Node.js セットアップ
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            # 3. 依存ライブラリをインストール
            - name: Install dependencies
              run: npm ci

            # 4. Playwright ブラウザのインストール
            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            # 5. E2Eテスト実行
            - name: Run E2E tests
              run: npx playwright test

            # 6. テスト結果のアーティファクト保存（失敗時のみ）
            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    # テストが成功した場合のみビルドを実行
    build:
        name: Build
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Build production bundle
              run: npm run build
            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  retention-days: 7
